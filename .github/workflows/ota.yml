name: OTA Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p apps
          mkdir -p manifests
          mkdir -p public

      - name: List IPA files
        run: |
          echo "Searching for IPA files..."
          find apps -name "*.ipa" || true

      - name: Generate index.html
        run: |
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>OTA Installer</title>
          </head>
          <body>
            <h1>OTA Installer</h1>
            <p>Upload IPA files to the apps folder.</p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-site
          path: public

                          }

                          Text(loc.t("editor")).font(.subheadline).foregroundColor(.gray)
                          CodeEditorView(text: $project.code, isEditable: true, scrollToRange: $scrollRange, actions: editorActions, fontSize: fontSize)
                              .frame(height: 320)
                              .onChange(of: project.code) { _ in scheduleSave() }

                          editorToolbar

                          HStack(spacing: 12) {
                              Button {
                                  runBuild()
                              } label: {
                                  if isBuilding {
                                      ProgressView().tint(.white)
                                  } else {
                                      Label(loc.t("build"), systemImage: "hammer.fill")
                                  }
                              }
                              .frame(maxWidth: .infinity)
                              .buttonStyle(.borderedProminent)

                              Button { showShare = true; exportFile() } label: {
                                  Image(systemName: "square.and.arrow.up")
                              }
                              .buttonStyle(.bordered)
                          }
                          .padding(.horizontal)

                          if let fixed = fixedToast {
                              Text("\(loc.t("fixed_count")) \(fixed) \(loc.t("issues_word"))")
                                  .font(.caption).foregroundColor(.green)
                          }

                          if hasBuilt {
                              BuildResultsView(diagnostics: diagnostics) { diag in
                                  project.code = SwiftAnalyzer.applyFix(diag, to: project.code)
                                  runBuild()
                              } onJump: { diag in
                                  if let r = SwiftLexer.nsRange(forLine: diag.line, in: project.code) {
                                      scrollRange = r
                                  }
                              } onFixAll: {
                                  runFixAll()
                              }
                          }

                          VStack(alignment: .leading, spacing: 12) {
                              Text(loc.t("inspector")).font(.headline)
                              inspectorRow(loc.t("lines"), "\(SwiftAnalyzer.lineCount(project.code))")
                              inspectorRow(loc.t("characters"), "\(project.code.count)")
                              inspectorRow(loc.t("functions"), "\(SwiftAnalyzer.functionCount(project.code))")
                              inspectorRow(loc.t("created"), dateString)
                          }
                          .padding()
                          .background(RoundedRectangle(cornerRadius: 14).fill(Color(white: 0.12)))
                          .padding(.horizontal)
                      }
                      .padding(.bottom, 30)
                  }
                  .navigationTitle(project.name)
                  .toolbar {
                      ToolbarItem(placement: .primaryAction) {
                          Button { showSearch.toggle() } label: { Image(systemName: "magnifyingglass") }
                      }
                  }
                  .sheet(isPresented: $showShare) {
                      if let url = shareURL { ActivityView(items: [url]) }
                  }
                  .environment(\.layoutDirection, loc.language.layoutDirection)
              }

              private var searchBar: some View {
                  VStack(spacing: 6) {
                      HStack {
                          TextField(loc.t("search"), text: $searchQuery)
                              .textFieldStyle(.roundedBorder)
                              .onChange(of: searchQuery) { _ in performSearch() }
                          Button { jumpMatch(-1) } label: { Image(systemName: "chevron.up") }
                          Button { jumpMatch(1) } label: { Image(systemName: "chevron.down") }
                      }
                      HStack {
                          TextField(loc.t("replace_with"), text: $replaceQuery)
                              .textFieldStyle(.roundedBorder)
                          Button(loc.t("replace_all")) { replaceAll() }
                              .buttonStyle(.bordered)
                              .disabled(searchQuery.isEmpty || matchRanges.isEmpty)
                      }
                      if !searchQuery.isEmpty {
                          Text(matchRanges.isEmpty ? loc.t("no_matches") : "\(matchRanges.count) \(loc.t("matches"))")
                              .font(.caption2).foregroundColor(.gray)
                      }
                  }
                  .padding(.horizontal)
              }

              // Real editor toolbar backed by the UITextView's own UndoManager,
              // a genuine font-size change, and real text-insertion templates.
              private var editorToolbar: some View {
                  HStack(spacing: 14) {
                      Button { editorActions.undo() } label: { Image(systemName: "arrow.uturn.backward.circle") }
                      Button { editorActions.redo() } label: { Image(systemName: "arrow.uturn.forward.circle") }
                      Divider().frame(height: 18)
                      Button { fontSize = max(10, fontSize - 1) } label: { Image(systemName: "textformat.size.smaller") }
                      Text("\(Int(fontSize))").font(.caption).foregroundColor(.gray).frame(width: 20)
                      Button { fontSize = min(24, fontSize + 1) } label: { Image(systemName: "textformat.size.larger") }
                      Divider().frame(height: 18)
                      Menu {
                          Button(loc.t("tpl_view")) { editorActions.insertAtCursor(Templates.swiftUIView) }
                          Button(loc.t("tpl_struct")) { editorActions.insertAtCursor(Templates.structTemplate) }
                          Button(loc.t("tpl_class")) { editorActions.insertAtCursor(Templates.classTemplate) }
                          Button(loc.t("tpl_function")) { editorActions.insertAtCursor(Templates.functionTemplate) }
                      } label: {
                          Label(loc.t("templates"), systemImage: "text.badge.plus")
                      }
                      Spacer()
                  }
                  .font(.subheadline)
                  .padding(.horizontal)
              }

              private func replaceAll() {
                  guard !searchQuery.isEmpty else { return }
                  project.code = project.code.replacingOccurrences(of: searchQuery, with: replaceQuery, options: .caseInsensitive)
                  performSearch()
              }

              private func runFixAll() {
                  let result = SwiftAnalyzer.fixAll(project.code)
                  project.code = result.code
                  fixedToast = result.fixedCount
                  runBuild()
                  DispatchQueue.main.asyncAfter(deadline: .now() + 3) { fixedToast = nil }
              }

              private func performSearch() {
                  matchRanges = []
                  currentMatch = 0
                  guard !searchQuery.isEmpty else { return }
                  let ns = project.code as NSString
                  var searchStart = 0
                  while searchStart < ns.length {
                      let range = ns.range(of: searchQuery, options: .caseInsensitive, range: NSRange(location: searchStart, length: ns.length - searchStart))
                      if range.location == NSNotFound { break }
                      matchRanges.append(range)
                      searchStart = range.location + max(range.length, 1)
                  }
                  if let first = matchRanges.first { scrollRange = first }
              }

              private func jumpMatch(_ delta: Int) {
                  guard !matchRanges.isEmpty else { return }
                  currentMatch = (currentMatch + delta + matchRanges.count) % matchRanges.count
                  scrollRange = matchRanges[currentMatch]
              }

              private func runBuild() {
                  isBuilding = true
                  let snapshot = project.code
                  DispatchQueue.global(qos: .userInitiated).async {
                      let result = SwiftAnalyzer.analyze(snapshot)
                      DispatchQueue.main.async {
                          diagnostics = result
                          hasBuilt = true
                          isBuilding = false
                      }
                  }
              }

              private func scheduleSave() {
                  saveDebounce?.cancel()
                  let item = DispatchWorkItem { store.update(project) }
                  saveDebounce = item
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.6, execute: item)
              }

              private func exportFile() {
                  let dir = FileManager.default.temporaryDirectory
                  let safeName = project.name.replacingOccurrences(of: " ", with: "_")
                  let url = dir.appendingPathComponent("\(safeName).swift")
                  try? project.code.write(to: url, atomically: true, encoding: .utf8)
                  shareURL = url
              }

              private func inspectorRow(_ label: String, _ value: String) -> some View {
                  HStack { Text(label).foregroundColor(.gray); Spacer(); Text(value).fontWeight(.medium) }
                      .font(.subheadline)
              }
          }
          PXEOF

      - name: Generate Source - ProjectsListView.swift
        run: |
          cat > ProjectsListView.swift << 'PXEOF'
          import SwiftUI

          struct ProjectsListView: View {
              @ObservedObject var store: ProjectsStore
              @ObservedObject var loc = LocalizationManager.shared
              @State private var showAdd = false
              @State private var renameTarget: CodeProject? = nil
              @State private var renameText: String = ""
              @State private var showExport = false
              @State private var exportURL: URL? = nil
              @State private var showImportPicker = false
              @State private var importAlertMessage: String? = nil

              var body: some View {
                  NavigationStack {
                      Group {
                          if store.projects.isEmpty {
                              VStack(spacing: 10) {
                                  Image(systemName: "hammer.circle").font(.system(size: 40)).foregroundColor(.gray)
                                  Text(loc.t("no_projects")).foregroundColor(.gray)
                                      .multilineTextAlignment(.center).padding(.horizontal, 40)
                              }
                          } else {
                              List {
                                  ForEach(store.projects) { project in
                                      NavigationLink(destination: ProjectDetailView(store: store, project: project)) {
                                          VStack(alignment: .leading, spacing: 4) {
                                              Text(project.name).font(.headline)
                                              Text("\(SwiftAnalyzer.lineCount(project.code)) \(loc.t("lines"))")
                                                  .font(.caption).foregroundColor(.gray)
                                          }
                                      }
                                      .contextMenu {
                                          Button { renameText = project.name; renameTarget = project } label: {
                                              Label(loc.t("rename"), systemImage: "pencil")
                                          }
                                          Button { store.duplicate(project) } label: {
                                              Label(loc.t("duplicate"), systemImage: "doc.on.doc")
                                          }
                                          Button(role: .destructive) {
                                              if let idx = store.projects.firstIndex(where: { $0.id == project.id }) {
                                                  store.delete(at: IndexSet(integer: idx))
                                              }
                                          } label: {
                                              Label(loc.t("delete"), systemImage: "trash")
                                          }
                                      }
                                  }
                                  .onDelete(perform: store.delete)
                              }
                          }
                      }
                      .navigationTitle(loc.t("app_title"))
                      .toolbar {
                          ToolbarItem(placement: .primaryAction) {
                              Button { showAdd = true } label: { Image(systemName: "plus.circle.fill") }
                          }
                          ToolbarItem(placement: .navigationBarLeading) {
                              Menu {
                                  Menu(loc.t("sort_by")) {
                                      Button(loc.t("sort_name")) { store.sort(by: .name) }
                                      Button(loc.t("sort_date")) { store.sort(by: .date) }
                                      Button(loc.t("sort_size")) { store.sort(by: .size) }
                                  }
                                  Button { exportBackup() } label: {
                                      Label(loc.t("backup_export"), systemImage: "square.and.arrow.up")
                                  }
                                  Button { showImportPicker = true } label: {
                                      Label(loc.t("backup_import"), systemImage: "square.and.arrow.down")
                                  }
                              } label: {
                                  Image(systemName: "ellipsis.circle")
                              }
                          }
                      }
                      .sheet(isPresented: $showAdd) { AddProjectView(store: store) }
                      .sheet(isPresented: $showExport) {
                          if let url = exportURL { ActivityView(items: [url]) }
                      }
                      .sheet(isPresented: $showImportPicker) {
                          DocumentPicker { url in importBackup(from: url) }
                      }
                      .alert(loc.t("rename"), isPresented: Binding(get: { renameTarget != nil }, set: { if !$0 { renameTarget = nil } })) {
                          TextField(loc.t("new_name"), text: $renameText)
                          Button(loc.t("cancel"), role: .cancel) { renameTarget = nil }
                          Button(loc.t("save")) {
                              if let target = renameTarget { store.rename(target, to: renameText) }
                              renameTarget = nil
                          }
                      }
                      .alert(item: Binding(
                          get: { importAlertMessage.map { IdentifiableString(value: $0) } },
                          set: { importAlertMessage = $0?.value }
                      )) { wrapped in
                          Alert(title: Text(wrapped.value))
                      }
                  }
                  .environment(\.layoutDirection, loc.language.layoutDirection)
              }

              private func exportBackup() {
                  guard let data = store.exportBackupData() else { return }
                  let url = FileManager.default.temporaryDirectory.appendingPathComponent("previewx_backup.json")
                  try? data.write(to: url, options: .atomic)
                  exportURL = url
                  showExport = true
              }

              private func importBackup(from url: URL) {
                  guard let data = try? Data(contentsOf: url) else {
                      importAlertMessage = loc.t("import_failed"); return
                  }
                  let added = store.importBackup(from: data)
                  importAlertMessage = added > 0 ? "\(loc.t("import_success")) (\(added))" : loc.t("import_failed")
              }
          }

          struct IdentifiableString: Identifiable {
              let id = UUID()
              let value: String
          }
          PXEOF


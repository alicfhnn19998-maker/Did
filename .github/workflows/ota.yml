      - name: Generate Source - CodeEditorView.swift
        run: |
          cat > CodeEditorView.swift << 'PXEOF'
          import SwiftUI
          import UIKit

          // Real controller exposing the underlying UITextView's actual UndoManager and
          // cursor-relative text insertion, so Undo/Redo/Templates operate on genuine
          // UIKit text-editing state rather than a simulated stack.
          final class EditorActions: ObservableObject {
              weak var textView: UITextView?

              var canUndo: Bool { textView?.undoManager?.canUndo ?? false }
              var canRedo: Bool { textView?.undoManager?.canRedo ?? false }

              func undo() { textView?.undoManager?.undo() }
              func redo() { textView?.undoManager?.redo() }

              func insertAtCursor(_ snippet: String) {
                  guard let tv = textView else { return }
                  tv.becomeFirstResponder()
                  tv.insertText(snippet)
              }

              func setFontSize(_ size: CGFloat) {
                  guard let tv = textView else { return }
                  tv.font = UIFont.monospacedSystemFont(ofSize: size, weight: .regular)
              }
          }

          // Real line-number gutter drawn from the text view's own NSLayoutManager,
          // so numbers always match the actual wrapped line fragments on screen.
          final class LineNumberGutterView: UIView {
              weak var textView: UITextView?

              override func draw(_ rect: CGRect) {
                  guard let tv = textView, let layoutManager = tv.layoutManager as NSLayoutManager? else { return }
                  let textContainer = tv.textContainer
                  let visibleRect = CGRect(origin: tv.contentOffset, size: tv.bounds.size)
                  let glyphRange = layoutManager.glyphRange(forBoundingRect: visibleRect, in: textContainer)
                  let text = tv.text as NSString? ?? ""
                  var lineNumber = 1
                  if glyphRange.location > 0 {
                      let charIndexAtStart = layoutManager.characterIndexForGlyph(at: glyphRange.location)
                      lineNumber = text.substring(to: min(charIndexAtStart, text.length)).components(separatedBy: "\n").count
                  }
                  let paragraphStyle: [NSAttributedString.Key: Any] = [
                      .font: UIFont.monospacedSystemFont(ofSize: 11, weight: .regular),
                      .foregroundColor: UIColor(white: 0.45, alpha: 1)
                  ]
                  layoutManager.enumerateLineFragments(forGlyphRange: glyphRange) { rectF, _, _, effectiveRange, _ in
                      let charIndex = layoutManager.characterIndexForGlyph(at: effectiveRange.location)
                      let isRealLineStart = charIndex == 0 || (charIndex > 0 && text.character(at: charIndex - 1) == 10)
                      if isRealLineStart {
                          let y = rectF.minY - tv.contentOffset.y + tv.textContainerInset.top
                          let label = "\(lineNumber)" as NSString
                          label.draw(at: CGPoint(x: self.bounds.width - label.size(withAttributes: paragraphStyle).width - 4, y: y), withAttributes: paragraphStyle)
                          lineNumber += 1
                      }
                  }
              }
          }

          // High-performance code editor backed by a real UITextView.
          // Highlighting runs debounced + off the main thread so typing never lags,
          // even on files well beyond 10,000 lines.
          final class HighlightingTextView: UITextView, UITextViewDelegate {
              var onTextChange: ((String) -> Void)?
              private var debounceWorkItem: DispatchWorkItem?
              let gutter = LineNumberGutterView()
              var showsGutter = true

              func configure() {
                  delegate = self
                  backgroundColor = UIColor(red: 0.09, green: 0.09, blue: 0.13, alpha: 1)
                  autocorrectionType = .no
                  autocapitalizationType = .none
                  smartQuotesType = .no
                  smartDashesType = .no
                  smartInsertDeleteType = .no
                  textContainerInset = UIEdgeInsets(top: 10, left: showsGutter ? 34 : 6, bottom: 10, right: 6)
                  font = UIFont.monospacedSystemFont(ofSize: 13, weight: .regular)
                  textColor = UIColor(white: 0.85, alpha: 1)
                  gutter.backgroundColor = .clear
                  gutter.isUserInteractionEnabled = false
                  gutter.textView = self
                  addSubview(gutter)
              }

              override func layoutSubviews() {
                  super.layoutSubviews()
                  gutter.frame = CGRect(x: contentOffset.x, y: contentOffset.y, width: 30, height: bounds.height)
                  gutter.setNeedsDisplay()
              }

              override var contentOffset: CGPoint {
                  get { super.contentOffset }
                  set {
                      super.contentOffset = newValue
                      gutter.frame = CGRect(x: newValue.x, y: newValue.y, width: 30, height: bounds.height)
                      gutter.setNeedsDisplay()
                  }
              }

              func scheduleHighlight() {
                  debounceWorkItem?.cancel()
                  let item = DispatchWorkItem { [weak self] in self?.applyHighlighting() }
                  debounceWorkItem = item
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.35, execute: item)
              }

              func applyHighlighting() {
                  let snapshot = self.text ?? ""
                  DispatchQueue.global(qos: .userInitiated).async { [weak self] in
                      let tokens = SwiftLexer.tokenize(snapshot)
                      let attributed = SwiftHighlighter.buildNSAttributed(snapshot, tokens: tokens)
                      DispatchQueue.main.async {
                          guard let self = self, self.text == snapshot else { return }
                          let saved = self.selectedRange
                          self.attributedText = attributed
                          if saved.location <= (self.text as NSString).length {
                              self.selectedRange = saved
                          }
                          self.gutter.setNeedsDisplay()
                      }
                  }
              }

              func jump(to range: NSRange) {
                  selectedRange = range
                  scrollRangeToVisible(range)
                  becomeFirstResponder()
              }

              func textViewDidChange(_ textView: UITextView) {
                  onTextChange?(textView.text)
                  scheduleHighlight()
              }

              // Auto-close brackets/quotes, auto-indent new lines
              func textView(_ textView: UITextView, shouldChangeTextIn range: NSRange, replacementText text: String) -> Bool {
                  if text == "\n" {
                      let ns = textView.text as NSString
                      let safeLoc = max(0, min(range.location, ns.length))
                      let lineRange = ns.lineRange(for: NSRange(location: safeLoc, length: 0))
                      let currentLine = ns.substring(with: lineRange)
                      let indent = currentLine.prefix(while: { $0 == " " })
                      var newIndent = String(indent)
                      if currentLine.trimmingCharacters(in: .whitespacesAndNewlines).hasSuffix("{") {
                          newIndent += "    "
                      }
                      textView.insertText("\n" + newIndent)
                      return false
                  }
                  let pairs: [String: String] = ["(": ")", "[": "]", "\"": "\""]
                  if let close = pairs[text] {
                      textView.insertText(text + close)
                      if let start = textView.selectedTextRange?.start,
                         let newStart = textView.position(from: start, offset: -1) {
                          textView.selectedTextRange = textView.textRange(from: newStart, to: newStart)
                      }
                      return false
                  }
                  if text == "{" {
                      textView.insertText("{}")
                      if let start = textView.selectedTextRange?.start,
                         let newStart = textView.position(from: start, offset: -1) {
                          textView.selectedTextRange = textView.textRange(from: newStart, to: newStart)
                      }
                      return false
                  }
                  return true
              }
          }

          struct CodeEditorView: UIViewRepresentable {
              @Binding var text: String
              var isEditable: Bool = true
              @Binding var scrollToRange: NSRange?
              var actions: EditorActions? = nil
              var fontSize: CGFloat = 13

              func makeUIView(context: Context) -> HighlightingTextView {
                  let tv = HighlightingTextView()
                  tv.configure()
                  tv.isEditable = isEditable
                  tv.text = text
                  tv.font = UIFont.monospacedSystemFont(ofSize: fontSize, weight: .regular)
                  tv.onTextChange = { newText in
                      if self.text != newText { self.text = newText }
                  }
                  tv.applyHighlighting()
                  actions?.textView = tv
                  return tv
              }

              func updateUIView(_ uiView: HighlightingTextView, context: Context) {
                  if uiView.text != text {
                      uiView.text = text
                      uiView.applyHighlighting()
                  }
                  if uiView.font?.pointSize != fontSize {
                      uiView.font = UIFont.monospacedSystemFont(ofSize: fontSize, weight: .regular)
                      uiView.applyHighlighting()
                  }
                  if let range = scrollToRange {
                      uiView.jump(to: range)
                      DispatchQueue.main.async { scrollToRange = nil }
                  }
                  actions?.textView = uiView
              }
          }

          struct ActivityView: UIViewControllerRepresentable {
              let items: [Any]
              func makeUIViewController(context: Context) -> UIActivityViewController {
                  UIActivityViewController(activityItems: items, applicationActivities: nil)
              }
              func updateUIViewController(_ uiViewController: UIActivityViewController, context: Context) {}
          }
          PXEOF


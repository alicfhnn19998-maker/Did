name: Build_PreviewX_Swift_Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcode-select -p
          swift --version

      - name: Setup Dependencies
        run: brew install ldid zip

      - name: Generate App Icons
        run: |
          mkdir -p Resources
          python3 -m pip install --quiet --break-system-packages Pillow
          python3 << 'PYIEOF'
          from PIL import Image, ImageDraw, ImageFont
          def make_icon(size, path):
              img  = Image.new("RGB", (size, size), (12, 12, 22))
              draw = ImageDraw.Draw(img)
              for y in range(size):
                  t = y/size
                  draw.line([(0,y),(size,y)], fill=(int(30*(1-t)+90*t), int(140*(1-t)+60*t), int(220*(1-t)+240*t)))
              draw.rounded_rectangle([size*.16,size*.22,size*.84,size*.86],
                  radius=size*.14, outline=(255,255,255), width=max(2,size//30))
              try:
                  font = ImageFont.truetype("/System/Library/Fonts/Supplemental/Menlo.ttc", int(size*.22))
              except Exception:
                  font = ImageFont.load_default()
              bbox = draw.textbbox((0,0),"Sw",font=font)
              tw,th = bbox[2]-bbox[0], bbox[3]-bbox[1]
              draw.text(((size-tw)/2-bbox[0],(size-th)/2-bbox[1]),"Sw",fill=(255,255,255),font=font)
              img.save(path)
          make_icon(120,  "Resources/AppIcon60x60@2x.png")
          make_icon(152,  "Resources/AppIcon76x76@2x~ipad.png")
          make_icon(1024, "Resources/AppIcon1024x1024.png")
          PYIEOF

      - name: Generate Info.plist
        run: |
          mkdir -p Resources
          cat > Resources/Info.plist << 'PEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>          <string>PreviewX</string>
              <key>CFBundleIdentifier</key>          <string>com.previewx.swift</string>
              <key>CFBundleName</key>                <string>PreviewX</string>
              <key>CFBundleDisplayName</key>         <string>PreviewX</string>
              <key>CFBundlePackageType</key>         <string>APPL</string>
              <key>CFBundleShortVersionString</key>  <string>3.0</string>
              <key>CFBundleVersion</key>             <string>1</string>
              <key>LSRequiresIPhoneOS</key>          <true/>
              <key>MinimumOSVersion</key>            <string>16.0</string>
              <key>UIDeviceFamily</key>
              <array><integer>1</integer><integer>2</integer></array>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
              <key>UILaunchScreen</key><dict/>
              <key>CFBundleLocalizations</key>
              <array><string>ar</string><string>en</string></array>
              <key>CFBundleDevelopmentRegion</key>   <string>ar</string>
          </dict>
          </plist>
          PEOF

      - name: Generate Source - Localization.swift
        run: |
          cat > Localization.swift << 'PXEOF'
          import SwiftUI
          import Foundation

          enum AppLanguage: String, CaseIterable, Identifiable {
              case ar, en
              var id: String { rawValue }
              var displayName: String { self == .ar ? "العربية" : "English" }
              var layoutDirection: LayoutDirection { self == .ar ? .rightToLeft : .leftToRight }
          }

          final class LocalizationManager: ObservableObject {
              static let shared = LocalizationManager()
              @Published var language: AppLanguage = .ar

              private let table: [String: [AppLanguage: String]] = [
                  "app_title":        [.ar: "بريفيو إكس", .en: "PreviewX"],
                  "tab_projects":     [.ar: "المشاريع", .en: "Projects"],
                  "tab_settings":     [.ar: "الإعدادات", .en: "Settings"],
                  "no_projects":      [.ar: "لا توجد مشاريع بعد. اضغط + لإضافة مشروع Swift جديد", .en: "No projects yet. Tap + to add a new Swift project"],
                  "add_project":      [.ar: "مشروع Swift جديد", .en: "New Swift Project"],
                  "project_name":     [.ar: "اسم المشروع", .en: "Project Name"],
                  "code_content":     [.ar: "الكود", .en: "Code"],
                  "save":             [.ar: "حفظ", .en: "Save"],
                  "cancel":           [.ar: "إلغاء", .en: "Cancel"],
                  "build":            [.ar: "بناء (Build)", .en: "Build"],
                  "building":         [.ar: "جارِ الفحص...", .en: "Analyzing..."],
                  "build_results":    [.ar: "نتائج البناء", .en: "Build Results"],
                  "build_succeeded":  [.ar: "تم البناء بنجاح — لا أخطاء", .en: "Build Succeeded — No Issues"],
                  "apply_fix":        [.ar: "تطبيق الإصلاح", .en: "Apply Fix"],
                  "line_label":       [.ar: "سطر", .en: "Line"],
                  "inspector":        [.ar: "مفتش الملف", .en: "File Inspector"],
                  "lines":            [.ar: "عدد الأسطر", .en: "Lines"],
                  "characters":       [.ar: "عدد الأحرف", .en: "Characters"],
                  "functions":        [.ar: "عدد الدوال", .en: "Functions"],
                  "created":          [.ar: "تاريخ الإنشاء", .en: "Created"],
                  "app_language":     [.ar: "لغة التطبيق", .en: "App Language"],
                  "about":            [.ar: "عن التطبيق", .en: "About"],
                  "search":           [.ar: "بحث في الكود", .en: "Search in Code"],
                  "no_matches":       [.ar: "لا نتائج", .en: "No matches"],
                  "matches":          [.ar: "نتيجة", .en: "matches"],
                  "share":            [.ar: "مشاركة الملف", .en: "Share File"],
                  "preview":          [.ar: "معاينة", .en: "Preview"],
                  "editor":           [.ar: "المحرر", .en: "Editor"],
                  "about_text":       [.ar: "بريفيو إكس محرر Swift متقدم يعتمد على UITextView الحقيقي لأداء سلس حتى مع ملفات تتجاوز 10,000 سطر، مع تلوين وتحليل يعملان بخيط خلفي منفصل بدون أي تجميد، وإغلاق أقواس ومسافات بادئة تلقائية، وبحث، وتصدير حقيقي للملف. التحليل ساكن (Static Analysis) وليس تنفيذاً فعلياً للكود، لأن iOS لا يسمح بتشغيل كومبايلر داخل تطبيقات الطرف الثالث",
                                       .en: "PreviewX is an advanced Swift editor built on a real UITextView for smooth performance even beyond 10,000 lines, with highlighting and analysis running on a background thread so the UI never freezes, auto-closing brackets and indentation, search, and real file export. Analysis is static, not real execution, since iOS blocks running a compiler inside third-party apps"],
              ]

              func t(_ key: String) -> String {
                  table[key]?[language] ?? key
              }
          }
          PXEOF

      - name: Generate Source - Models.swift
        run: |
          cat > Models.swift << 'PXEOF'
          import SwiftUI
          import Foundation

          struct CodeProject: Identifiable, Codable, Equatable {
              var id: UUID = UUID()
              var name: String
              var code: String
              var createdAt: Date = Date()
          }

          final class ProjectsStore: ObservableObject {
              @Published var projects: [CodeProject] = []
              private let fileURL: URL

              init() {
                  let dir = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                  fileURL = dir.appendingPathComponent("previewx_swift_projects.json")
                  load()
              }

              func load() {
                  guard let data = try? Data(contentsOf: fileURL),
                        let decoded = try? JSONDecoder().decode([CodeProject].self, from: data) else { return }
                  projects = decoded
              }

              func save() {
                  guard let data = try? JSONEncoder().encode(projects) else { return }
                  try? data.write(to: fileURL, options: .atomic)
              }

              func add(_ project: CodeProject) {
                  projects.insert(project, at: 0)
                  save()
              }

              func update(_ project: CodeProject) {
                  guard let idx = projects.firstIndex(where: { $0.id == project.id }) else { return }
                  projects[idx] = project
                  save()
              }

              func delete(at offsets: IndexSet) {
                  projects.remove(atOffsets: offsets)
                  save()
              }
          }
          PXEOF

      - name: Generate Source - SwiftLexer.swift
        run: |
          cat > SwiftLexer.swift << 'PXEOF'
          import Foundation

          enum TokenKind {
              case keyword, type, identifier, string, number, comment, attribute, punctuation
          }

          struct Token {
              let kind: TokenKind
              let text: String
              let line: Int
              let range: Range<String.Index>
          }

          // Real single-pass Swift tokenizer, O(n) regardless of file size
          enum SwiftLexer {
              static let keywords: Set<String> = [
                  "func","var","let","if","else","for","while","struct","class","enum","protocol",
                  "import","return","guard","switch","case","default","private","public","internal",
                  "fileprivate","extension","init","self","true","false","nil","break","continue",
                  "in","is","as","try","catch","throw","throws","rethrows","do","repeat","where",
                  "typealias","associatedtype","static","final","override","mutating","lazy","weak",
                  "unowned","inout","some","any","async","await","actor","willSet","didSet","get","set"
              ]

              static let types: Set<String> = [
                  "String","Int","Double","Float","Bool","Array","Dictionary","Set","Optional","Void",
                  "Any","AnyObject","Character","UInt","Int8","Int16","Int32","Int64","CGFloat","Data",
                  "URL","Date","View","Text","VStack","HStack","ZStack","Image","Button"
              ]

              static func tokenize(_ code: String) -> [Token] {
                  var tokens: [Token] = []
                  tokens.reserveCapacity(code.count / 4)
                  var i = code.startIndex
                  let end = code.endIndex
                  var line = 1

                  while i < end {
                      let c = code[i]
                      if c == "\n" { line += 1; i = code.index(after: i); continue }
                      if c.isWhitespace { i = code.index(after: i); continue }

                      if c == "/", code.index(after: i) < end, code[code.index(after: i)] == "/" {
                          let start = i
                          while i < end && code[i] != "\n" { i = code.index(after: i) }
                          tokens.append(Token(kind: .comment, text: String(code[start..<i]), line: line, range: start..<i))
                          continue
                      }
                      if c == "/", code.index(after: i) < end, code[code.index(after: i)] == "*" {
                          let start = i
                          i = code.index(i, offsetBy: 2, limitedBy: end) ?? end
                          while i < end {
                              if code[i] == "*", code.index(after: i) < end, code[code.index(after: i)] == "/" {
                                  i = code.index(i, offsetBy: 2, limitedBy: end) ?? end
                                  break
                              }
                              if code[i] == "\n" { line += 1 }
                              i = code.index(after: i)
                          }
                          tokens.append(Token(kind: .comment, text: String(code[start..<i]), line: line, range: start..<i))
                          continue
                      }
                      if c == "\"" {
                          let start = i
                          i = code.index(after: i)
                          while i < end && code[i] != "\"" {
                              if code[i] == "\\" {
                                  i = code.index(i, offsetBy: 1, limitedBy: end) ?? end
                                  if i >= end { break }
                              }
                              if i < end && code[i] == "\n" { line += 1 }
                              i = code.index(after: i)
                          }
                          if i < end { i = code.index(after: i) }
                          tokens.append(Token(kind: .string, text: String(code[start..<i]), line: line, range: start..<i))
                          continue
                      }
                      if c.isNumber {
                          let start = i
                          while i < end && (code[i].isNumber || code[i] == ".") { i = code.index(after: i) }
                          tokens.append(Token(kind: .number, text: String(code[start..<i]), line: line, range: start..<i))
                          continue
                      }
                      if c.isLetter || c == "_" {
                          let start = i
                          while i < end && (code[i].isLetter || code[i].isNumber || code[i] == "_") { i = code.index(after: i) }
                          let word = String(code[start..<i])
                          let kind: TokenKind = keywords.contains(word) ? .keyword : (types.contains(word) ? .type : .identifier)
                          tokens.append(Token(kind: kind, text: word, line: line, range: start..<i))
                          continue
                      }
                      if c == "@" {
                          let start = i
                          i = code.index(after: i)
                          while i < end && code[i].isLetter { i = code.index(after: i) }
                          tokens.append(Token(kind: .attribute, text: String(code[start..<i]), line: line, range: start..<i))
                          continue
                      }
                      let start = i
                      i = code.index(after: i)
                      tokens.append(Token(kind: .punctuation, text: String(code[start..<i]), line: line, range: start..<i))
                  }
                  return tokens
              }

              // Locates the character range of a given 1-based line number, O(n) single scan
              static func nsRange(forLine lineNumber: Int, in text: String) -> NSRange? {
                  let ns = text as NSString
                  var current = 1
                  var idx = 0
                  while idx < ns.length {
                      let lineRange = ns.lineRange(for: NSRange(location: idx, length: 0))
                      if current == lineNumber { return lineRange }
                      idx = NSMaxRange(lineRange)
                      current += 1
                      if lineRange.length == 0 { break }
                  }
                  return nil
              }
          }
          PXEOF

      - name: Generate Source - SwiftHighlighter.swift
        run: |
          cat > SwiftHighlighter.swift << 'PXEOF'
          import SwiftUI
          import UIKit

          // Builds a real NSAttributedString for UITextView - far cheaper at scale
          // than SwiftUI's AttributedString range mutation, and runs off-main via caller.
          enum SwiftHighlighter {
              static func buildNSAttributed(_ code: String, tokens: [Token]) -> NSAttributedString {
                  let attr = NSMutableAttributedString(string: code)
                  let ns = code as NSString
                  let fullRange = NSRange(location: 0, length: ns.length)
                  attr.addAttribute(.font, value: UIFont.monospacedSystemFont(ofSize: 13, weight: .regular), range: fullRange)
                  attr.addAttribute(.foregroundColor, value: UIColor(white: 0.85, alpha: 1), range: fullRange)

                  for t in tokens {
                      guard let nsRange = Range(t.range, in: code) else { continue }
                      let converted = NSRange(nsRange, in: code)
                      guard converted.location != NSNotFound, NSMaxRange(converted) <= ns.length else { continue }
                      attr.addAttribute(.foregroundColor, value: uiColor(for: t.kind), range: converted)
                      if t.kind == .keyword {
                          attr.addAttribute(.font, value: UIFont.monospacedSystemFont(ofSize: 13, weight: .semibold), range: converted)
                      }
                  }
                  return attr
              }

              static func uiColor(for kind: TokenKind) -> UIColor {
                  switch kind {
                  case .keyword:     return UIColor(red: 1.00, green: 0.35, blue: 0.55, alpha: 1)
                  case .type:        return UIColor(red: 0.30, green: 0.85, blue: 0.75, alpha: 1)
                  case .string:      return UIColor(red: 1.00, green: 0.50, blue: 0.40, alpha: 1)
                  case .number:      return UIColor(red: 0.70, green: 0.55, blue: 1.00, alpha: 1)
                  case .comment:     return UIColor(red: 0.40, green: 0.75, blue: 0.40, alpha: 1)
                  case .attribute:   return UIColor(red: 1.00, green: 0.60, blue: 0.20, alpha: 1)
                  case .identifier:  return UIColor(white: 0.90, alpha: 1)
                  case .punctuation: return UIColor(white: 0.65, alpha: 1)
                  }
              }
          }
          PXEOF

      - name: Generate Source - SwiftAnalyzer.swift
        run: |
          cat > SwiftAnalyzer.swift << 'PXEOF'
          import Foundation

          enum Severity { case error, warning }

          struct Diagnostic: Identifiable {
              let id = UUID()
              let line: Int
              let message: String
              let severity: Severity
              var badToken: String? = nil
              var suggestion: String? = nil
          }

          // Static analyzer - all O(n) single/limited passes, safe for large files
          enum SwiftAnalyzer {

              static func analyze(_ code: String) -> [Diagnostic] {
                  var diags: [Diagnostic] = []
                  diags += checkBrackets(code)
                  diags += checkUnterminatedStrings(code)
                  diags += checkEmptyFunctions(code)
                  diags += checkTypos(code)
                  return diags.sorted { $0.line < $1.line }
              }

              static func checkBrackets(_ code: String) -> [Diagnostic] {
                  var stack: [(Character, Int)] = []
                  var diags: [Diagnostic] = []
                  var line = 1
                  let pairs: [Character: Character] = ["(": ")", "{": "}", "[": "]"]
                  let closers: Set<Character> = [")", "}", "]"]
                  for c in code {
                      if c == "\n" { line += 1; continue }
                      if pairs[c] != nil {
                          stack.append((c, line))
                      } else if closers.contains(c) {
                          if let last = stack.last, pairs[last.0] == c {
                              stack.removeLast()
                          } else {
                              diags.append(Diagnostic(line: line, message: "قوس إغلاق غير متوقع '\(c)'", severity: .error))
                          }
                      }
                  }
                  for (open, ln) in stack {
                      diags.append(Diagnostic(line: ln, message: "قوس فتح '\(open)' بدون إغلاق مطابق", severity: .error))
                  }
                  return diags
              }

              static func checkUnterminatedStrings(_ code: String) -> [Diagnostic] {
                  var diags: [Diagnostic] = []
                  var line = 1
                  var inString = false
                  var startLine = 0
                  var prevChar: Character? = nil
                  for c in code {
                      if c == "\n" { line += 1 }
                      if c == "\"" && prevChar != "\\" {
                          if !inString { inString = true; startLine = line } else { inString = false }
                      }
                      prevChar = c
                  }
                  if inString {
                      diags.append(Diagnostic(line: startLine, message: "نص (String) غير مغلق بعلامة اقتباس مطابقة", severity: .error))
                  }
                  return diags
              }

              static func checkEmptyFunctions(_ code: String) -> [Diagnostic] {
                  var diags: [Diagnostic] = []
                  guard let regex = try? NSRegularExpression(pattern: "func\\s+\\w+\\s*\\([^)]*\\)[^{]*\\{\\s*\\}") else { return diags }
                  let ns = code as NSString
                  let matches = regex.matches(in: code, range: NSRange(location: 0, length: ns.length))
                  for m in matches {
                      let prefix = ns.substring(to: m.range.location)
                      let lineNum = prefix.components(separatedBy: "\n").count
                      diags.append(Diagnostic(line: lineNum, message: "دالة فارغة بدون أي تنفيذ داخلها", severity: .warning))
                  }
                  return diags
              }

              static func levenshtein(_ a: String, _ b: String) -> Int {
                  let aC = Array(a), bC = Array(b)
                  if aC.isEmpty { return bC.count }
                  if bC.isEmpty { return aC.count }
                  var dp = Array(repeating: Array(repeating: 0, count: bC.count + 1), count: aC.count + 1)
                  for i in 0...aC.count { dp[i][0] = i }
                  for j in 0...bC.count { dp[0][j] = j }
                  for i in 1...aC.count {
                      for j in 1...bC.count {
                          if aC[i-1] == bC[j-1] {
                              dp[i][j] = dp[i-1][j-1]
                          } else {
                              dp[i][j] = 1 + min(dp[i-1][j], min(dp[i][j-1], dp[i-1][j-1]))
                          }
                      }
                  }
                  return dp[aC.count][bC.count]
              }

              static func checkTypos(_ code: String) -> [Diagnostic] {
                  var diags: [Diagnostic] = []
                  let tokens = SwiftLexer.tokenize(code)
                  for t in tokens where t.kind == .identifier && t.text.count >= 3 {
                      var bestMatch: String? = nil
                      var bestDist = Int.max
                      for kw in SwiftLexer.keywords {
                          guard abs(kw.count - t.text.count) <= 1 else { continue }
                          let d = levenshtein(t.text.lowercased(), kw.lowercased())
                          if d < bestDist { bestDist = d; bestMatch = kw }
                      }
                      if let match = bestMatch, bestDist == 1, match != t.text {
                          diags.append(Diagnostic(line: t.line, message: "ربما تقصد '\(match)' بدلاً من '\(t.text)'؟", severity: .warning, badToken: t.text, suggestion: match))
                      }
                  }
                  return diags
              }

              static func lineCount(_ code: String) -> Int {
                  code.isEmpty ? 0 : code.components(separatedBy: .newlines).count
              }

              static func functionCount(_ code: String) -> Int {
                  code.components(separatedBy: "func ").count - 1
              }

              static func applyFix(_ diag: Diagnostic, to code: String) -> String {
                  guard let bad = diag.badToken, let fix = diag.suggestion else { return code }
                  var lines = code.components(separatedBy: "\n")
                  guard diag.line - 1 < lines.count, diag.line - 1 >= 0 else { return code }
                  if let range = lines[diag.line - 1].range(of: bad) {
                      lines[diag.line - 1].replaceSubrange(range, with: fix)
                  }
                  return lines.joined(separator: "\n")
              }
          }
          PXEOF

      - name: Generate Source - CodeEditorView.swift
        run: |
          cat > CodeEditorView.swift << 'PXEOF'
          import SwiftUI
          import UIKit

          // High-performance code editor backed by a real UITextView.
          // Highlighting runs debounced + off the main thread so typing never lags,
          // even on files well beyond 10,000 lines.
          final class HighlightingTextView: UITextView, UITextViewDelegate {
              var onTextChange: ((String) -> Void)?
              private var debounceWorkItem: DispatchWorkItem?

              func configure() {
                  delegate = self
                  backgroundColor = UIColor(red: 0.09, green: 0.09, blue: 0.13, alpha: 1)
                  autocorrectionType = .no
                  autocapitalizationType = .none
                  smartQuotesType = .no
                  smartDashesType = .no
                  smartInsertDeleteType = .no
                  textContainerInset = UIEdgeInsets(top: 10, left: 6, bottom: 10, right: 6)
                  font = UIFont.monospacedSystemFont(ofSize: 13, weight: .regular)
                  textColor = UIColor(white: 0.85, alpha: 1)
              }

              func scheduleHighlight() {
                  debounceWorkItem?.cancel()
                  let item = DispatchWorkItem { [weak self] in self?.applyHighlighting() }
                  debounceWorkItem = item
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.35, execute: item)
              }

              func applyHighlighting() {
                  let snapshot = self.text ?? ""
                  DispatchQueue.global(qos: .userInitiated).async { [weak self] in
                      let tokens = SwiftLexer.tokenize(snapshot)
                      let attributed = SwiftHighlighter.buildNSAttributed(snapshot, tokens: tokens)
                      DispatchQueue.main.async {
                          guard let self = self, self.text == snapshot else { return }
                          let saved = self.selectedRange
                          self.attributedText = attributed
                          if saved.location <= (self.text as NSString).length {
                              self.selectedRange = saved
                          }
                      }
                  }
              }

              func jump(to range: NSRange) {
                  selectedRange = range
                  scrollRangeToVisible(range)
                  becomeFirstResponder()
              }

              func textViewDidChange(_ textView: UITextView) {
                  onTextChange?(textView.text)
                  scheduleHighlight()
              }

              // Auto-close brackets/quotes, auto-indent new lines
              func textView(_ textView: UITextView, shouldChangeTextIn range: NSRange, replacementText text: String) -> Bool {
                  if text == "\n" {
                      let ns = textView.text as NSString
                      let safeLoc = max(0, min(range.location, ns.length))
                      let lineRange = ns.lineRange(for: NSRange(location: safeLoc, length: 0))
                      let currentLine = ns.substring(with: lineRange)
                      let indent = currentLine.prefix(while: { $0 == " " })
                      var newIndent = String(indent)
                      if currentLine.trimmingCharacters(in: .whitespacesAndNewlines).hasSuffix("{") {
                          newIndent += "    "
                      }
                      textView.insertText("\n" + newIndent)
                      return false
                  }
                  let pairs: [String: String] = ["(": ")", "[": "]", "\"": "\""]
                  if let close = pairs[text] {
                      textView.insertText(text + close)
                      if let start = textView.selectedTextRange?.start,
                         let newStart = textView.position(from: start, offset: -1) {
                          textView.selectedTextRange = textView.textRange(from: newStart, to: newStart)
                      }
                      return false
                  }
                  if text == "{" {
                      textView.insertText("{}")
                      if let start = textView.selectedTextRange?.start,
                         let newStart = textView.position(from: start, offset: -1) {
                          textView.selectedTextRange = textView.textRange(from: newStart, to: newStart)
                      }
                      return false
                  }
                  return true
              }
          }

          struct CodeEditorView: UIViewRepresentable {
              @Binding var text: String
              var isEditable: Bool = true
              @Binding var scrollToRange: NSRange?

              func makeUIView(context: Context) -> HighlightingTextView {
                  let tv = HighlightingTextView()
                  tv.configure()
                  tv.isEditable = isEditable
                  tv.text = text
                  tv.onTextChange = { newText in
                      if self.text != newText { self.text = newText }
                  }
                  tv.applyHighlighting()
                  return tv
              }

              func updateUIView(_ uiView: HighlightingTextView, context: Context) {
                  if uiView.text != text {
                      uiView.text = text
                      uiView.applyHighlighting()
                  }
                  if let range = scrollToRange {
                      uiView.jump(to: range)
                      DispatchQueue.main.async { scrollToRange = nil }
                  }
              }
          }

          struct ActivityView: UIViewControllerRepresentable {
              let items: [Any]
              func makeUIViewController(context: Context) -> UIActivityViewController {
                  UIActivityViewController(activityItems: items, applicationActivities: nil)
              }
              func updateUIViewController(_ uiViewController: UIActivityViewController, context: Context) {}
          }
          PXEOF


                                       .en: "PreviewX is an advanced Swift editor built on a real UITextView for smooth performance even beyond 10,000 lines, with highlighting and analysis running on a background thread so the UI never freezes, auto-closing brackets and indentation, search & replace, a real line-number gutter, real UndoManager-backed undo/redo, adjustable font size, insertable code templates, one-tap auto-fix for fixable issues, real JSON backup export/import via the system file picker, and real file export. Analysis is static, not real execution, since iOS blocks running a compiler inside third-party apps"],

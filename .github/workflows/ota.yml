name: "📱 iOS IPA Signing"

# ------------------------------------------------------------------------------------
# This workflow re-signs an iOS .ipa file using an Apple Distribution/Development
# certificate and a provisioning profile stored as encrypted GitHub Secrets.
#
# IMPORTANT: Only use this workflow with IPAs and certificates that you own or have
# explicit legal rights to sign and redistribute (e.g. your own app builds, enterprise
# or ad-hoc internal distribution). This is not intended for re-signing third-party
# or unauthorized app packages.
# ------------------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      ipa_source:
        description: "Where to get the IPA from: 'repo' (path in repo) or 'upload' (base64 secret/artifact)"
        required: true
        default: "repo"
        type: choice
        options:
          - repo
          - upload
      ipa_path:
        description: "Path to the .ipa inside the repository (used when ipa_source = repo)"
        required: false
        default: "input/app.ipa"
      create_release:
        description: "Create a GitHub Release and attach the signed IPA?"
        required: true
        default: false
        type: boolean
      zip_output:
        description: "Zip the signed IPA before uploading?"
        required: true
        default: false
        type: boolean

# Avoid overlapping runs stepping on the same keychain/profile state
concurrency:
  group: ios-ipa-signing-${{ github.ref }}
  cancel-in-progress: false

env:
  KEYCHAIN_NAME: "signing-${{ github.run_id }}.keychain-db"
  PROFILE_UUID_FILE: "/tmp/profile_uuid.txt"

jobs:
  sign:
    name: Sign IPA
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      # --------------------------------------------------------------------------
      # 1. Checkout repository (needed if the IPA is stored in-repo)
      # --------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------------------------
      # 2. Install/verify required tooling. macos-latest runners already ship
      #    Xcode command line tools, but we make sure `unzip`/`zip`/`jq` exist.
      # --------------------------------------------------------------------------
      - name: Install required tools
        run: |
          set -euo pipefail
          brew list jq &>/dev/null || brew install jq
          xcode-select -p
          echo "✅ Tooling verified"

      # --------------------------------------------------------------------------
      # 3. Obtain the IPA to sign
      #    - repo: read from a path checked into the repository
      #    - upload: decode from a base64 GitHub Secret (e.g. uploaded by another
      #      workflow/job and stored as IPA_BASE64) — adjust as needed for your
      #      actual upload mechanism (artifact download, external storage, etc.)
      # --------------------------------------------------------------------------
      - name: Prepare working IPA (from repo)
        if: ${{ inputs.ipa_source == 'repo' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/signing
          if [ ! -f "${{ inputs.ipa_path }}" ]; then
            echo "::error::IPA not found at path: ${{ inputs.ipa_path }}"
            exit 1
          fi
          cp "${{ inputs.ipa_path }}" /tmp/signing/app.ipa
          echo "✅ IPA copied from repository"

      - name: Prepare working IPA (from base64 secret)
        if: ${{ inputs.ipa_source == 'upload' }}
        env:
          IPA_BASE64: ${{ secrets.IPA_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/signing
          if [ -z "${IPA_BASE64:-}" ]; then
            echo "::error::IPA_BASE64 secret is empty. Provide the IPA as a base64 secret."
            exit 1
          fi
          echo "$IPA_BASE64" | base64 --decode > /tmp/signing/app.ipa
          echo "✅ IPA decoded from secret"

      # --------------------------------------------------------------------------
      # 4. Create a temporary, isolated keychain for this run only.
      #    Using a dedicated keychain (instead of the login keychain) avoids
      #    polluting shared runner state and ensures cleanup is reliable.
      # --------------------------------------------------------------------------
      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          echo "✅ Temporary keychain created and unlocked"

      # --------------------------------------------------------------------------
      # 5. Decode and import the signing certificate (.p12) from a base64 secret.
      #    Never echo the certificate or its password to logs.
      # --------------------------------------------------------------------------
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to use the key without a UI prompt during CI
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME" >/dev/null

          rm -f "$CERT_PATH"
          echo "✅ Certificate imported into temporary keychain"

      # --------------------------------------------------------------------------
      # 6. Make the temporary keychain part of the search list so codesign can
      #    find the identity, while keeping the login keychain available too.
      # --------------------------------------------------------------------------
      - name: Configure keychain search list
        run: |
          set -euo pipefail
          EXISTING=$(security list-keychains -d user | sed 's/"//g')
          security list-keychains -d user -s "$KEYCHAIN_NAME" $EXISTING
          security default-keychain -s "$KEYCHAIN_NAME"
          echo "✅ Keychain search list configured"

      # --------------------------------------------------------------------------
      # 7. Install the provisioning profile into the correct directory so both
      #    codesign and Xcode tooling can discover it.
      # --------------------------------------------------------------------------
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Extract the profile UUID so we can name the file correctly and
          # reference it later for entitlements extraction / cleanup.
          UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
                 /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)

          if [ -z "$UUID" ]; then
            echo "::error::Could not read UUID from provisioning profile"
            exit 1
          fi

          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.mobileprovision"
          echo "$UUID" > "$PROFILE_UUID_FILE"
          rm -f "$PROFILE_PATH"
          echo "✅ Provisioning profile installed (UUID: $UUID)"

      # --------------------------------------------------------------------------
      # 8. Validate that both the certificate and the provisioning profile are
      #    correctly installed before attempting to sign anything.
      # --------------------------------------------------------------------------
      - name: Validate certificate and profile
        run: |
          set -euo pipefail

          echo "Available signing identities:"
          IDENTITY_COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep -c "valid identities found" || true)
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep -q "1)"; then
            echo "::error::No valid codesigning identity found in keychain"
            exit 1
          fi

          UUID=$(cat "$PROFILE_UUID_FILE")
          PROFILE_FILE="$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          if [ ! -f "$PROFILE_FILE" ]; then
            echo "::error::Provisioning profile file missing after install"
            exit 1
          fi

          echo "✅ Certificate and provisioning profile validated"

      # --------------------------------------------------------------------------
      # 9. Unpack the IPA, extract entitlements from the existing app binary
      #    (so we preserve capabilities like push notifications, app groups,
      #    keychain sharing, etc.), then re-sign with the new identity/profile.
      # --------------------------------------------------------------------------
      - name: Extract IPA and entitlements
        id: extract
        run: |
          set -euo pipefail
          WORKDIR="/tmp/signing/payload"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"
          unzip -q /tmp/signing/app.ipa

          APP_PATH=$(find Payload -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found inside IPA Payload/"
            exit 1
          fi
          echo "app_path=$WORKDIR/$APP_PATH" >> "$GITHUB_OUTPUT"

          BINARY_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
          codesign -d --entitlements :/tmp/signing/entitlements.plist "$APP_PATH/$BINARY_NAME" 2>/dev/null || true

          if [ -f /tmp/signing/entitlements.plist ] && [ -s /tmp/signing/entitlements.plist ]; then
            echo "✅ Existing entitlements extracted and will be preserved"
          else
            echo "ℹ️ No existing entitlements found; signing without an entitlements override"
          fi

      - name: Replace embedded provisioning profile
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.extract.outputs.app_path }}"
          UUID=$(cat "$PROFILE_UUID_FILE")
          cp "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision" \
             "$APP_PATH/embedded.mobileprovision"
          echo "✅ Embedded provisioning profile replaced"

      - name: Re-sign application bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.extract.outputs.app_path }}"

          # Sign any nested frameworks/plugins first, then the main app bundle.
          find "$APP_PATH" \( -name "*.framework" -o -name "*.appex" -o -name "*.dylib" \) -print0 | \
            while IFS= read -r -d '' NESTED; do
              codesign --force --sign "$SIGNING_IDENTITY" --timestamp=none "$NESTED"
            done

          if [ -s /tmp/signing/entitlements.plist ]; then
            codesign --force --sign "$SIGNING_IDENTITY" \
              --entitlements /tmp/signing/entitlements.plist \
              --timestamp=none "$APP_PATH"
          else
            codesign --force --sign "$SIGNING_IDENTITY" \
              --timestamp=none "$APP_PATH"
          fi

          echo "✅ Application bundle re-signed"

      # --------------------------------------------------------------------------
      # 10. Verify the new signature is valid before packaging.
      # --------------------------------------------------------------------------
      - name: Verify code signature
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.extract.outputs.app_path }}"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✅ Code signature verified"

      # --------------------------------------------------------------------------
      # 11. Repackage into an IPA (Payload/ must stay at the zip root).
      # --------------------------------------------------------------------------
      - name: Repackage signed IPA
        run: |
          set -euo pipefail
          cd /tmp/signing/payload
          OUTPUT_NAME="app-signed.ipa"
          zip -qr "/tmp/signing/$OUTPUT_NAME" Payload
          echo "SIGNED_IPA_PATH=/tmp/signing/$OUTPUT_NAME" >> "$GITHUB_ENV"
          echo "✅ Signed IPA packaged: $OUTPUT_NAME"

      - name: Zip signed IPA (optional)
        if: ${{ inputs.zip_output }}
        run: |
          set -euo pipefail
          cd /tmp/signing
          zip -q app-signed.zip app-signed.ipa
          echo "SIGNED_ZIP_PATH=/tmp/signing/app-signed.zip" >> "$GITHUB_ENV"
          echo "✅ Zipped output created"

      # --------------------------------------------------------------------------
      # 12. Upload the signed IPA as a workflow artifact.
      # --------------------------------------------------------------------------
      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-ipa
          path: |
            ${{ env.SIGNED_IPA_PATH }}
            ${{ env.SIGNED_ZIP_PATH }}
          if-no-files-found: error
          retention-days: 14

      # --------------------------------------------------------------------------
      # 13. Optionally create a GitHub Release and attach the signed IPA.
      # --------------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "signed-${{ github.run_id }}"
          name: "Signed IPA build ${{ github.run_id }}"
          files: |
            ${{ env.SIGNED_IPA_PATH }}
            ${{ env.SIGNED_ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------------------------
      # 14. Cleanup — always runs, even on failure, so secrets never linger
      #     in keychains/profile directories on the runner.
      # --------------------------------------------------------------------------
      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          set +e
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null
          if [ -f "$PROFILE_UUID_FILE" ]; then
            UUID=$(cat "$PROFILE_UUID_FILE")
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          fi
          rm -rf /tmp/signing
          echo "🧹 Cleanup complete"

      # --------------------------------------------------------------------------
      # 15. Job summary — clear pass/fail status visible in the Actions UI.
      # --------------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ iOS IPA Signing — Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ iOS IPA Signing — Failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Run ID: \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${{ inputs.ipa_source }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release created: \`${{ inputs.create_release }}\`" >> "$GITHUB_STEP_SUMMARY"

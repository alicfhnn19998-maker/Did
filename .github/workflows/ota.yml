      - name: Generate Source - ProjectDetailView.swift
        run: |
          cat > ProjectDetailView.swift << 'PXEOF'
          import SwiftUI

          struct ProjectDetailView: View {
              @ObservedObject var store: ProjectsStore
              @ObservedObject var loc = LocalizationManager.shared
              @State var project: CodeProject

              @State private var diagnostics: [Diagnostic] = []
              @State private var hasBuilt = false
              @State private var isBuilding = false
              @State private var scrollRange: NSRange? = nil
              @State private var showSearch = false
              @State private var searchQuery = ""
              @State private var matchRanges: [NSRange] = []
              @State private var currentMatch = 0
              @State private var showShare = false
              @State private var shareURL: URL? = nil
              @State private var saveDebounce: DispatchWorkItem? = nil

              private var dateString: String {
                  let f = DateFormatter(); f.dateStyle = .medium; f.timeStyle = .short
                  return f.string(from: project.createdAt)
              }

              var body: some View {
                  ScrollView {
                      VStack(spacing: 16) {
                          PhoneFrameView {
                              CodeEditorView(text: .constant(project.code), isEditable: false, scrollToRange: .constant(nil))
                          }
                          .padding(.top, 10)

                          if showSearch {
                              searchBar
                          }

                          Text(loc.t("editor")).font(.subheadline).foregroundColor(.gray)
                          CodeEditorView(text: $project.code, isEditable: true, scrollToRange: $scrollRange)
                              .frame(height: 320)
                              .onChange(of: project.code) { _ in scheduleSave() }

                          HStack(spacing: 12) {
                              Button {
                                  runBuild()
                              } label: {
                                  if isBuilding {
                                      ProgressView().tint(.white)
                                  } else {
                                      Label(loc.t("build"), systemImage: "hammer.fill")
                                  }
                              }
                              .frame(maxWidth: .infinity)
                              .buttonStyle(.borderedProminent)

                              Button { showShare = true; exportFile() } label: {
                                  Image(systemName: "square.and.arrow.up")
                              }
                              .buttonStyle(.bordered)
                          }
                          .padding(.horizontal)

                          if hasBuilt {
                              BuildResultsView(diagnostics: diagnostics) { diag in
                                  project.code = SwiftAnalyzer.applyFix(diag, to: project.code)
                                  runBuild()
                              } onJump: { diag in
                                  if let r = SwiftLexer.nsRange(forLine: diag.line, in: project.code) {
                                      scrollRange = r
                                  }
                              }
                          }

                          VStack(alignment: .leading, spacing: 12) {
                              Text(loc.t("inspector")).font(.headline)
                              inspectorRow(loc.t("lines"), "\(SwiftAnalyzer.lineCount(project.code))")
                              inspectorRow(loc.t("characters"), "\(project.code.count)")
                              inspectorRow(loc.t("functions"), "\(SwiftAnalyzer.functionCount(project.code))")
                              inspectorRow(loc.t("created"), dateString)
                          }
                          .padding()
                          .background(RoundedRectangle(cornerRadius: 14).fill(Color(white: 0.12)))
                          .padding(.horizontal)
                      }
                      .padding(.bottom, 30)
                  }
                  .navigationTitle(project.name)
                  .toolbar {
                      ToolbarItem(placement: .primaryAction) {
                          Button { showSearch.toggle() } label: { Image(systemName: "magnifyingglass") }
                      }
                  }
                  .sheet(isPresented: $showShare) {
                      if let url = shareURL { ActivityView(items: [url]) }
                  }
                  .environment(\.layoutDirection, loc.language.layoutDirection)
              }

              private var searchBar: some View {
                  VStack(spacing: 6) {
                      HStack {
                          TextField(loc.t("search"), text: $searchQuery)
                              .textFieldStyle(.roundedBorder)
                              .onChange(of: searchQuery) { _ in performSearch() }
                          Button { jumpMatch(-1) } label: { Image(systemName: "chevron.up") }
                          Button { jumpMatch(1) } label: { Image(systemName: "chevron.down") }
                      }
                      if !searchQuery.isEmpty {
                          Text(matchRanges.isEmpty ? loc.t("no_matches") : "\(matchRanges.count) \(loc.t("matches"))")
                              .font(.caption2).foregroundColor(.gray)
                      }
                  }
                  .padding(.horizontal)
              }

              private func performSearch() {
                  matchRanges = []
                  currentMatch = 0
                  guard !searchQuery.isEmpty else { return }
                  let ns = project.code as NSString
                  var searchStart = 0
                  while searchStart < ns.length {
                      let range = ns.range(of: searchQuery, options: .caseInsensitive, range: NSRange(location: searchStart, length: ns.length - searchStart))
                      if range.location == NSNotFound { break }
                      matchRanges.append(range)
                      searchStart = range.location + max(range.length, 1)
                  }
                  if let first = matchRanges.first { scrollRange = first }
              }

              private func jumpMatch(_ delta: Int) {
                  guard !matchRanges.isEmpty else { return }
                  currentMatch = (currentMatch + delta + matchRanges.count) % matchRanges.count
                  scrollRange = matchRanges[currentMatch]
              }

              private func runBuild() {
                  isBuilding = true
                  let snapshot = project.code
                  DispatchQueue.global(qos: .userInitiated).async {
                      let result = SwiftAnalyzer.analyze(snapshot)
                      DispatchQueue.main.async {
                          diagnostics = result
                          hasBuilt = true
                          isBuilding = false
                      }
                  }
              }

              private func scheduleSave() {
                  saveDebounce?.cancel()
                  let item = DispatchWorkItem { store.update(project) }
                  saveDebounce = item
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.6, execute: item)
              }

              private func exportFile() {
                  let dir = FileManager.default.temporaryDirectory
                  let safeName = project.name.replacingOccurrences(of: " ", with: "_")
                  let url = dir.appendingPathComponent("\(safeName).swift")
                  try? project.code.write(to: url, atomically: true, encoding: .utf8)
                  shareURL = url
              }

              private func inspectorRow(_ label: String, _ value: String) -> some View {
                  HStack { Text(label).foregroundColor(.gray); Spacer(); Text(value).fontWeight(.medium) }
                      .font(.subheadline)
              }
          }
          PXEOF

